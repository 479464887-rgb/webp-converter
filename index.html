hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff}.btn-primary:hover{background:#2ea043}</style></head><body><header><h1>🖼 WebP Converter</h1><div class="lang-switch"><button class="active" onclick="setLang("zh")">中文</button><button onclick="setLang("en")">EN</button></div></header><div class="container"><input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)"><div class="upload-zone" id="dropZone" onclick="document.getElementById("fileInput").click()"><div style="font-size:48px;margin-bottom:12px">🖼</div><div>点击上传图片 / Click to upload</div><div style="font-size:12px;color:#484f58;margin-top:8px">支持 PNG, JPG, GIF → WebP</div></div><div class="controls" id="controls"><div class="row"><label>质量 Quality</label><input type="range" id="quality" min="1" max="100" value="80" oninput="document.getElementById("qLabel").textContent=this.value"><span id="qLabel" style="font-size:13px;color:#8b949e">80</span></div><div class="row"><label>最大宽度</label><input type="number" id="maxWidth" value="0" min="0"><span style="font-size:12px;color:#484f58">0=原始尺寸</span></div><button class="btn btn-primary" onclick="convert()">🔄 转换为WebP</button></div><div class="preview" id="preview"></div></div><script>var lang="zh",originalImg=null;function setLang(l){lang=l;document.querySelectorAll(".lang-switch button").forEach(function(b,i){b.classList.toggle("active",(i===0&&l==="zh")||(i===1&&l==="en"))})}function handleFile(e){var file=e.target.files[0];if(!file||!file.type.match(/image//))return;var reader=new FileReader();reader.onload=function(ev){var img=new Image();img.onload=function(){originalImg=img;document.getElementById("controls").style.display="block";var preview=document.getElementById("preview");preview.innerHTML="<div class="preview-card"><img src=""+ev.target.result+""><div class="info">原始 "+img.width+"x"+img.height+" | "+formatSize(file.size)+"</div></div>";document.getElementById("maxWidth").value=img.width>1200?1200:0};img.src=ev.target.result};reader.readAsDataURL(file)}function convert(){if(!originalImg){alert("请先上传图片");return}var quality=parseInt(document.getElementById("quality").value)/100;var maxW=parseInt(document.getElementById("maxWidth").value)||originalImg.width;var scale=Math.min(1,maxW/originalImg.width);var canvas=document.createElement("canvas");canvas.width=originalImg.width*scale;canvas.height=originalImg.height*scale;var ctx=canvas.getContext("2d");ctx.drawImage(originalImg,0,0,canvas.width,canvas.height);canvas.toBlob(function(blob){var url=URL.createObjectURL(blob);var preview=document.getElementById("preview");preview.innerHTML+="<div class="preview-card"><img src=""+url+""><div class="info">WebP "+canvas.width+"x"+canvas.height+" | "+formatSize(blob.size)+"</div><button class="btn btn-primary" onclick="downloadWebp()">⬇️ 下载WebP</button></div>";window._webpBlob=blob;window._webpUrl=url},"image/webp",quality)}function downloadWebp(){if(window._webpBlob){var a=document.createElement("a");a.href=window._webpUrl;a.download="converted.webp";a.click()}}function formatSize(b){if(b<1024)return b+" B";if(b<1048576)return (b/1024).toFixed(1)+" KB";return (b/1048576).toFixed(1)+" MB"}</script></body></html>
